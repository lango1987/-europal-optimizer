<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europal Optimizer Pro</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<h1>📦 Europal Optimizer Pro</h1>
</header>

<div class="container">

<div class="sidebar">

<h2>Berechnung</h2>

<label>Kartonlänge (mm)</label>
<input id="length" type="number" placeholder="300">

<label>Kartonbreite (mm)</label>
<input id="width" type="number" placeholder="200">

<label>Kartonhöhe (mm)</label>
<input id="height" type="number" placeholder="150">

<label>Maximale Stapelhöhe (mm)</label>
<input id="maxHeight" type="number" value="1800">

<button id="calculate">
Optimieren
</button>

</div>

<div class="content">

<div class="cards">

<div class="card">
<h3>Kartons/Lage</h3>
<p id="layer">0</p>
</div>

<div class="card">
<h3>Lagen</h3>
<p id="layers">0</p>
</div>

<div class="card">
<h3>Gesamt</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Auslastung</h3>
<p id="utilization">0 %</p>
</div>

</div>

<div class="variants">

<h2>Optimierungsvarianten</h2>

<div id="variantList">

<p>Noch keine Berechnung durchgeführt.</p>

</div>

</div>

<canvas id="canvas" width="900" height="600"></canvas>

<div class="buttons">

<button id="layer1">
Lage 1
</button>

<button id="layer2">
Lage 2
</button>

</div>

</div>

</div>

<script src="patterns.js"></script>
<script src="optimizer.js"></script>
<script src="canvas.js"></script>
<script src="app.js"></script>

</body>
</html>
